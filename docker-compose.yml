services:
  postgres:
    image: postgres:16-alpine
    container_name: docker-cost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docker-cost
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: docker-cost
    volumes:
      - docker-cost-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker-cost"]
      interval: 5s
      timeout: 5s
      retries: 5

  container-cost:
    image: ghcr.io/edsuwarna/container-cost:latest
    container_name: container-cost
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Docker socket — required to collect container stats
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Config directory
      - container-cost-data:/data
    environment:
      - PORT=8080
      - DOCKER_COST_CONFIG_DIR=/data
      - DATABASE_URL=postgres://docker-cost:docker-cost@postgres:5432/docker-cost?sslmode=disable
      - TZ=Asia/Jakarta
      # Admin credentials — set DOCKER_COST_ADMIN_PASSWORD env var in production
      - DOCKER_COST_ADMIN_PASSWORD=${DOCKER_COST_ADMIN_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  docker-cost-pgdata:
    driver: local
  container-cost-data:
    driver: local
