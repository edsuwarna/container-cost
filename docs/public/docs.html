<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Cost — Documentation</title>
    <meta name="description" content="Container Cost Documentation — Multi-VPS Docker Container Cost Calculator">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text2: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --orange: #d29922;
            --red: #f85149;
            --code-bg: #151b23;
            --inline-code-bg: #21262d;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-size: 15px;
        }

        /* ─── Layout ─── */
        .layout { display: flex; min-height: 100vh; }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 280px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            padding: 0;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }
        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-header .logo {
            font-size: 28px;
            line-height: 1;
        }
        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar-header small {
            display: block;
            font-size: 11px;
            color: var(--text2);
            font-weight: 400;
            -webkit-text-fill-color: var(--text2);
        }

        .sidebar-back {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 20px;
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .sidebar-back:hover { background: var(--bg3); }

        /* TOC */
        .toc { padding: 12px 0; }
        .toc-label {
            padding: 8px 20px 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text2);
        }
        .toc a {
            display: block;
            padding: 5px 20px 5px 24px;
            color: var(--text2);
            text-decoration: none;
            font-size: 13px;
            border-left: 2px solid transparent;
            transition: all 0.15s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toc a:hover { color: var(--text); background: var(--bg3); }
        .toc a.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: #1f6feb11;
        }
        .toc a.level-2 { padding-left: 36px; font-size: 12.5px; }
        .toc a.level-3 { padding-left: 48px; font-size: 12px; }

        /* ─── Main Content ─── */
        .content {
            flex: 1;
            margin-left: 280px;
            padding: 40px 56px;
            max-width: 960px;
        }

        /* ─── Markdown Rendering ─── */
        .markdown-body h1 {
            font-size: 36px;
            font-weight: 800;
            margin: 0 0 8px;
            background: linear-gradient(135deg, var(--accent), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .markdown-body h1 .header-anchor { display: none; }
        .markdown-body h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 40px 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .markdown-body h3 {
            font-size: 18px;
            font-weight: 600;
            margin: 28px 0 8px;
        }
        .markdown-body h4 {
            font-size: 15px;
            font-weight: 600;
            margin: 20px 0 6px;
        }
        .markdown-body p { margin: 0 0 12px; color: var(--text); }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body strong { font-weight: 600; }
        .markdown-body ul, .markdown-body ol { margin: 8px 0 16px; padding-left: 24px; }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body li > ul, .markdown-body li > ol { margin: 4px 0; }

        /* ─── Tables ─── */
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0 20px;
            font-size: 14px;
        }
        .markdown-body th {
            background: var(--bg3);
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            border: 1px solid var(--border);
        }
        .markdown-body td {
            padding: 8px 12px;
            border: 1px solid var(--border);
        }
        .markdown-body tr:nth-child(even) td {
            background: var(--bg2);
        }

        /* ─── Inline Code ─── */
        .markdown-body code {
            background: var(--inline-code-bg);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 13px;
            color: #f0f6fc;
        }
        .markdown-body pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px 20px;
            margin: 12px 0 20px;
            overflow-x: auto;
            line-height: 1.5;
        }
        .markdown-body pre code {
            background: none;
            border: none;
            padding: 0;
            color: #c9d1d9;
            font-size: 13px;
            tab-size: 2;
        }

        /* ─── Blockquotes ─── */
        .markdown-body blockquote {
            border-left: 3px solid var(--accent);
            padding: 12px 16px;
            margin: 12px 0 20px;
            background: #1f6feb0a;
            border-radius: 0 8px 8px 0;
        }
        .markdown-body blockquote p { margin: 0; color: var(--text2); }

        /* ─── Horizontal Rule ─── */
        .markdown-body hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 36px 0;
        }

        /* ─── Image / Emoji ─── */
        .markdown-body img { max-width: 100%; border-radius: 8px; }

        /* ─── Code Language Tags ─── */
        .markdown-body pre {
            position: relative;
        }

        /* ─── Loading ─── */
        .loading-state {
            text-align: center;
            padding: 80px 20px;
        }
        .loading-state .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state p { color: var(--text2); font-size: 14px; }

        .error-state {
            text-align: center;
            padding: 80px 20px;
        }
        .error-state .err-icon { font-size: 48px; margin-bottom: 12px; }
        .error-state h2 { color: var(--red); }
        .error-state p { color: var(--text2); margin-top: 8px; }

        /* ─── Scrollbar ─── */
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ─── Mobile ─── */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 12px; left: 12px;
            z-index: 200;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 20px;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .sidebar-toggle { display: block; }
            .content { margin-left: 0; padding: 24px 20px; }
            .markdown-body h1 { font-size: 28px; }
            .markdown-body h2 { font-size: 20px; }
        }

        /* ─── Updated Badge ─── */
        .updated-badge {
            display: inline-block;
            background: #1f6feb22;
            border: 1px solid #1f6feb44;
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        /* ─── Checklist ─── */
        .markdown-body input[type="checkbox"] {
            accent-color: var(--green);
            margin-right: 6px;
        }

        /* Footer */
        .doc-footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text2);
            font-size: 13px;
        }
        .doc-footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="layout">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">💰</div>
                <div>
                    <h2>Container Cost</h2>
                    <small>Documentation v2.0</small>
                </div>
            </div>
            <a href="/" class="sidebar-back">← Back to Home</a>
            <div class="toc" id="toc">
                <div class="toc-label">On this page</div>
                <!-- Generated by JS -->
            </div>
        </nav>

        <!-- Main Content -->
        <main class="content">
            <div id="docsContent">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading documentation...</p>
                </div>
            </div>
            <div class="doc-footer">
                Built with ❤️ by <a href="https://github.com/edsuwarna">Endang Suwarna</a> ·
                <a href="https://github.com/edsuwarna/container-cost">GitHub</a> ·
                <a href="https://github.com/edsuwarna/container-cost/blob/main/docs/DOCS.md">Edit on GitHub</a>
            </div>
        </main>
    </div>

    <script>
        // ─── Markdown source ───
        const DOCS_URL = '/docs-content.md';

        // ─── Toggle sidebar ───
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        // ─── Simple Markdown Renderer (no external deps) ───
        function renderMarkdown(md) {
            // Escape HTML
            md = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Code blocks first (protect them)
            const codeBlocks = [];
            md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                const id = codeBlocks.length;
                codeBlocks.push({ lang, code: code.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&') });
                return `%%CODEBLOCK_${id}%%`;
            });

            // Inline code (protect)
            const inlineCodes = [];
            md = md.replace(/`([^`]+)`/g, (_, code) => {
                const id = inlineCodes.length;
                inlineCodes.push(code);
                return `%%INLINECODE_${id}%%`;
            });

            // Headings with ID for anchors
            md = md.replace(/^#### (.+)$/gm, (_, text) => {
                const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                return `<h4 id="${id}">${text}</h4>`;
            });
            md = md.replace(/^### (.+)$/gm, (_, text) => {
                const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                return `<h3 id="${id}">${text}</h3>`;
            });
            md = md.replace(/^## (.+)$/gm, (_, text) => {
                const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                return `<h2 id="${id}">${text}</h2>`;
            });
            md = md.replace(/^# (.+)$/gm, (_, text) => {
                const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                return `<h1 id="${id}">${text}</h1>`;
            });

            // Horizontal rules
            md = md.replace(/^---+\s*$/gm, '<hr>');

            // Bold & italic
            md = md.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');
            md = md.replace(/~~(.+?)~~/g, '<del>$1</del>');

            // Links
            md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
                if (url.startsWith('http')) {
                    return `<a href="${url}" target="_blank" rel="noopener">${text}</a>`;
                }
                return `<a href="${url}">${text}</a>`;
            });

            // Images
            md = md.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');

            // Checklists
            md = md.replace(/- \[x\] /gi, '- ✅ ');
            md = md.replace(/- \[ \] /gi, '- ☐ ');

            // Unordered lists
            md = md.replace(/^(\s*)[-*] (.+)$/gm, '$1• $2');

            // Ordered lists (keep numbers)
            md = md.replace(/^(\s*)(\d+)\. (.+)$/gm, '$1<span class="ol-num">$2.</span> $3');

            // Blockquotes
            md = md.replace(/^&gt; (.+)$/gm, '<blockquote><p>$1</p></blockquote>');

            // Restore inline codes
            md = md.replace(/%%INLINECODE_(\d+)%%/g, (_, id) => {
                return `<code>${inlineCodes[parseInt(id)]}</code>`;
            });

            // Restore code blocks
            md = md.replace(/%%CODEBLOCK_(\d+)%%/g, (_, id) => {
                const block = codeBlocks[parseInt(id)];
                const lang = block.lang ? `<div style="font-size:11px;color:#8b949e;margin-bottom:-10px;padding:0 0 4px;font-family:monospace;">${block.lang}</div>` : '';
                return `<pre>${lang}<code>${escapeHtml(block.code)}</code></pre>`;
            });

            // Tables
            md = md.replace(/^(\|.+\|)\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, (_, header, body) => {
                const headers = header.split('|').filter(c => c.trim()).map(c => c.trim());
                const rows = body.trim().split('\n').map(r => r.split('|').filter(c => c.trim()).map(c => c.trim()));
                let html = '<table><thead><tr>';
                headers.forEach(h => { html += `<th>${h}</th>`; });
                html += '</tr></thead><tbody>';
                rows.forEach(row => {
                    html += '<tr>';
                    row.forEach(cell => { html += `<td>${cell}</td>`; });
                    html += '</tr>';
                });
                html += '</tbody></table>';
                return html;
            });

            // Paragraphs: wrap text blocks not already wrapped
            const lines = md.split('\n');
            let html = '';
            let inPara = false;
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const trimmed = line.trim();
                if (trimmed === '') {
                    if (inPara) { html += '</p>'; inPara = false; }
                    continue;
                }
                if (trimmed.startsWith('<h') || trimmed.startsWith('<pre') || trimmed.startsWith('<table') ||
                    trimmed.startsWith('<hr') || trimmed.startsWith('<blockquote') || trimmed.startsWith('<ul') ||
                    trimmed.startsWith('<ol') || trimmed.startsWith('</')) {
                    if (inPara) { html += '</p>'; inPara = false; }
                    html += trimmed + '\n';
                    continue;
                }
                if (trimmed.startsWith('•') || trimmed.match(/^\d+\./)) {
                    if (inPara) { html += '</p>'; inPara = false; }
                    html += trimmed + '\n';
                    continue;
                }
                if (!inPara) { html += '<p>'; inPara = true; }
                else { html += ' '; }
                html += trimmed;
            }
            if (inPara) html += '</p>';

            return html;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // ─── Build TOC ───
        function buildTOC(html) {
            const toc = document.getElementById('toc');
            const headings = html.match(/<h([23]) id="([^"]+)"[^>]*>([^<]+)<\/h[23]>/g);
            if (!headings) return;

            headings.forEach(h => {
                const level = h.match(/<h([23])/)[1];
                const id = h.match(/id="([^"]+)"/)[1];
                const text = h.match(/<h[23][^>]*>([^<]+)<\/h[23]>/)[1];
                // Skip main title
                if (level === '1') return;

                const a = document.createElement('a');
                a.href = '#' + id;
                a.textContent = text;
                a.className = 'level-' + level;
                a.addEventListener('click', () => {
                    if (window.innerWidth <= 900) toggleSidebar();
                });
                toc.appendChild(a);
            });
        }

        // ─── Active TOC tracking ───
        function setupActiveTOC() {
            const links = document.querySelectorAll('.toc a');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        links.forEach(l => l.classList.remove('active'));
                        const id = entry.target.id;
                        const link = document.querySelector(`.toc a[href="#${id}"]`);
                        if (link) link.classList.add('active');
                    }
                });
            }, { rootMargin: '-80px 0px -60% 0px' });

            document.querySelectorAll('h2[id], h3[id]').forEach(el => observer.observe(el));
        }

        // ─── Fetch & Render ───
        async function loadDocs() {
            const container = document.getElementById('docsContent');
            try {
                const resp = await fetch(DOCS_URL);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const md = await resp.text();

                const html = renderMarkdown(md);
                container.innerHTML = '<div class="markdown-body">' + html + '</div>';

                buildTOC(html);
                setupActiveTOC();

                // Scroll to hash on load
                if (window.location.hash) {
                    setTimeout(() => {
                        document.getElementById(window.location.hash.slice(1))?.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                }
            } catch (err) {
                container.innerHTML = `
                    <div class="error-state">
                        <div class="err-icon">⚠️</div>
                        <h2>Failed to load documentation</h2>
                        <p>Could not load documentation content.</p>
                        <p style="margin-top:16px;color:#8b949e;font-size:13px;">${err.message}</p>
                        <div style="margin-top:20px;">
                            <a href="https://github.com/edsuwarna/container-cost/blob/main/docs/DOCS.md" style="color:#58a6ff;">View on GitHub →</a>
                        </div>
                    </div>
                `;
            }
        }

        loadDocs();
    </script>
</body>
</html>
